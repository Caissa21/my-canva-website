<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>
  <body>
    <div class="calculator">
      <div id="expression">0</div>
      <div id="display">0</div>

      <div class="row">
        <button class="others" id="ac">AC</button>
        <button class="others" id="c">C</button>
        <button class="others" id="percent">%</button>
        <button class="operator" id="divide">÷</button>
      </div>

      <div class="row">
        <button class="numbers">7</button>
        <button class="numbers">8</button>
        <button class="numbers">9</button>
        <button class="operator" id="multiply">×</button>
      </div>

      <div class="row">
        <button class="numbers">4</button>
        <button class="numbers">5</button>
        <button class="numbers">6</button>
        <button class="operator" id="subtract">-</button>
      </div>

      <div class="row">
        <button class="numbers">1</button>
        <button class="numbers">2</button>
        <button class="numbers">3</button>
        <button class="operator" id="add">+</button>
      </div>

      <div class="row last-row">
        <button class="numbers" id="zero">0</button>
        <button class="numbers" id="decimal">.</button>
        <button class="operator" id="equals">=</button>
      </div>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
